<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>双因子猎手 V19.2 魔改版 | 穹顶微观火控</title>
    <style>
        :root {
            --bg-color: #0b0e14; --panel-bg: #131820; --text-main: #e0e6ed;
            --text-muted: #6b7280; --accent-green: #00e676; --accent-red: #ff3d00;
            --border-color: #2a3241; --api-blue: #00b0ff; --warning-yellow: #ffd600;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center;}
        .container { width: 100%; max-width: 900px; }
        
        .hud-panel { background: rgba(19, 24, 32, 0.8); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 0 20px rgba(0, 176, 255, 0.05); }
        .hud-header { font-size: 14px; font-weight: bold; color: var(--api-blue); margin-bottom: 15px; border-bottom: 1px dashed var(--border-color); padding-bottom: 8px; letter-spacing: 1px;}
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: #8ab4f8; margin-bottom: 4px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; box-sizing: border-box; background-color: #000; border: 1px solid #333; color: var(--text-main); border-radius: 4px; font-size: 14px; font-weight:bold; transition: 0.3s;}
        .form-group input:focus, .form-group select:focus { border-color: var(--api-blue); box-shadow: 0 0 8px rgba(0, 176, 255, 0.3); outline: none; }

        .radar-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; background: #000; padding: 10px; border-radius: 6px; border: 1px solid #333;}
        .btn-scan { padding: 10px 20px; background: var(--api-blue); color: #000; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; }
        
        .readout-box { background: rgba(0,0,0,0.5); border: 1px solid #333; border-radius: 4px; padding: 10px; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 50px;}
        .readout-box span { font-size: 11px; color: #6b7280; margin-bottom: 4px;}
        .readout-box strong { font-size: 22px; color: #fff; font-family: monospace;}

        .checkbox-group { background: rgba(0, 176, 255, 0.05); border: 1px dashed var(--api-blue); padding: 10px; border-radius: 4px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; transition: 0.3s;}
        .checkbox-group:hover { background: rgba(0, 176, 255, 0.1); }
        .checkbox-group label { font-size: 13px; color: #8ab4f8; cursor: pointer; font-weight: bold;}
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer;}
        
        .btn-execute { width: 100%; padding: 20px; font-size: 22px; font-weight: bold; background: #8b0000; color: #fff; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; letter-spacing: 4px; transition: 0.2s;}
        .btn-execute:hover { background: var(--accent-red); box-shadow: 0 0 20px rgba(255, 61, 0, 0.5); }
        
        #resultPanel { background-color: #000; padding: 20px; border-left: 5px solid #333; font-family: monospace; font-size: 14px; white-space: pre-wrap; margin-top: 20px; line-height: 1.6; }
        .pass { color: var(--accent-green); } .fail { color: var(--accent-red); }

        /* 魔改里程碑样式 */
        .milestone-container { margin-top: 20px; background: rgba(0,0,0,0.8); border: 1px solid #444; border-radius: 6px; padding: 15px; }
        .milestone-header { color: var(--warning-yellow); font-size: 14px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px dashed #444; padding-bottom: 8px; display: flex; align-items: center;}
        .milestone-item { display: flex; align-items: flex-start; margin-bottom: 12px; padding: 10px; background: rgba(255,255,255,0.03); border-left: 3px solid; border-radius: 0 4px 4px 0;}
        .ms-1r { border-left-color: var(--api-blue); }
        .ms-bias { border-left-color: var(--warning-yellow); }
        .ms-3r { border-left-color: var(--accent-green); }
        .ms-title { font-weight: bold; width: 160px; font-size: 13px; flex-shrink: 0;}
        .ms-action { font-size: 13px; color: #ccc; }
        .ms-price { font-family: monospace; font-size: 15px; font-weight: bold; color: #fff; background: #222; padding: 2px 6px; border-radius: 3px; margin-left: 5px;}
    </style>
</head>
<body>

<div class="container">
    <div style="text-align:center; margin-bottom: 20px;">
        <h1 style="color:var(--api-blue); margin:0; letter-spacing: 2px;">V19.2 穹顶微观火控面板</h1>
        <p style="color:#666; font-size:12px; margin-top:5px;">反PPT安检 | 量价测距 | 动态里程碑推演</p>
    </div>

    <div class="radar-bar">
        <input type="text" id="apiCodeInput" placeholder="输入股票代码" style="padding:10px; width:120px; background:transparent; border:1px solid #444; color:#fff; font-weight:bold;">
        <button class="btn-scan" onclick="fetchStockAPI()">雷达锁定</button>
        <input type="text" id="stockName" readonly placeholder="--" style="padding:10px; width:100px; background:transparent; border:none; color:var(--warning-yellow); font-weight:bold; font-size:16px;">
        <span id="radarStatus" style="font-size:12px; color:#666; margin-left:auto;">等待目标注入...</span>
    </div>

    <div class="grid-2">
        <div class="hud-panel">
            <div class="hud-header" style="color:var(--warning-yellow); border-bottom-color:var(--warning-yellow);">🛡️ 战前基本面安检 (灵魂三问)</div>
            <div class="checkbox-group">
                <input type="checkbox" id="chk_order"><label>供货节点确认 (有真实订单/量产落地，拒买PPT)</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="chk_diffuse"><label>产业扩散确认 (属核心主线真实外溢，非边缘蹭热点)</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="chk_moat"><label>护城河确认 (同赛道当前无更低价/更优替代品)</label>
            </div>

            <div class="hud-header" style="margin-top: 25px;">🎯 战术与微观数据录入</div>
            <div class="form-group">
                <select id="sniperMode">
                    <option value="A_pullback" selected>🚢 阵位一：中军缩量回踩 MA20 (主力位)</option>
                    <option value="A_second">🌊 阵位二：中军二波放量启动 (右侧位)</option>
                    <option value="B_breakout">🚀 阵位三：高弹平台放量突破 (刺客位)</option>
                </select>
            </div>
            <div class="grid-2">
                <div class="form-group"><label>现价 (抓取)</label><input type="number" id="price" step="0.01" oninput="liveCalc()"></div>
                <div class="form-group"><label>今日ATR (必填)</label><input type="number" id="atr" step="0.01" oninput="liveCalc()"></div>
                <div class="form-group"><label>目标阻力价 (必填)</label><input type="number" id="targetPrice" step="0.01" oninput="liveCalc()"></div>
                <div class="form-group"><label>今日量 (抓取)</label><input type="number" id="volToday"></div>
                <div class="form-group"><label style="color:var(--warning-yellow);">BIAS(20) [测距]</label><input type="number" id="bias20" step="0.01"></div>
                <div class="form-group"><label style="color:var(--accent-green);">20日均量 (必填)</label><input type="number" id="vol20Days"></div>
                <div class="form-group"><label style="color:var(--api-blue);">BIAS(5) [情绪]</label><input type="number" id="bias5" step="0.01"></div>
                <div class="form-group"><label style="color:#fff;">首发底仓金额 (如总预算的30%)</label><input type="number" id="capital" placeholder="例：准备建仓3万"></div>
            </div>
        </div>

        <div class="hud-panel">
            <div class="hud-header">⚖️ 实时火控读数与生命线</div>
            
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="color:var(--accent-red); font-size:14px;">🚨 绝对物理止损价 (跌破无条件斩首)</label>
                <div class="readout-box" style="border-color:var(--accent-red); background:rgba(255,0,0,0.1); height:60px;">
                    <strong id="liveStop" style="color:var(--accent-red); font-size:28px;">--</strong>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label style="color:var(--api-blue); font-size:14px;">🎯 动态盈亏比测算 (RR)</label>
                <div class="readout-box" style="border-color:var(--api-blue); background:rgba(0,176,255,0.05); height:60px;">
                    <span id="upsideLabel">预期上涨空间</span>
                    <strong id="liveRR">-- : 1</strong>
                </div>
            </div>

            <button class="btn-execute" onclick="executeFireControl()">开火决断 (FIRE)</button>
        </div>
    </div>

    <div id="resultPanel">等待进行基本面安检与火控参数注入...</div>
</div>

<script>
    function fetchStockAPI() {
        let code = document.getElementById('apiCodeInput').value.trim();
        if(!code) return;
        if(/^\d{6}$/.test(code)) code = (code.startsWith('6') ? 'sh' : 'sz') + code;
        
        document.getElementById('radarStatus').innerText = "抓取中...";
        const script = document.createElement('script');
        script.src = `https://qt.gtimg.cn/q=${code}`;
        script.onload = function() {
            try {
                const data = window['v_'+code].split('~');
                document.getElementById('stockName').value = data[1]; 
                document.getElementById('price').value = data[3];    
                document.getElementById('volToday').value = data[36]; 
                document.getElementById('radarStatus').innerText = "已锁定";
                document.getElementById('radarStatus').style.color = "var(--accent-green)";
                liveCalc(); 
            } catch (e) {
                document.getElementById('radarStatus').innerText = "失败";
            }
        };
        document.body.appendChild(script);
    }

    function liveCalc() {
        const p = parseFloat(document.getElementById('price').value);
        const atr = parseFloat(document.getElementById('atr').value);
        const tp = parseFloat(document.getElementById('targetPrice').value);
        const stopDisplay = document.getElementById('liveStop');
        const rrDisplay = document.getElementById('liveRR');
        const upsideLabel = document.getElementById('upsideLabel');

        if (!isNaN(p) && !isNaN(atr) && p > 0 && atr > 0) {
            stopDisplay.innerHTML = (p - 1.5 * atr).toFixed(2);
        } else { stopDisplay.innerHTML = "--"; }

        if (!isNaN(p) && !isNaN(atr) && !isNaN(tp) && p > 0 && atr > 0 && tp > p) {
            const risk = 1.5 * atr; 
            const up = tp - p; 
            const rr = up / risk;
            upsideLabel.innerHTML = `上涨空间: +${(up/p*100).toFixed(1)}%`;
            rrDisplay.innerHTML = `${rr.toFixed(2)} : 1`;
            rrDisplay.style.color = rr >= 2.5 ? "var(--accent-green)" : (rr >= 1.5 ? "var(--warning-yellow)" : "var(--accent-red)");
        } else {
            upsideLabel.innerHTML = `预期上涨空间`;
            rrDisplay.innerHTML = "-- : 1"; rrDisplay.style.color = "#fff";
        }
    }

    function executeFireControl() {
        const panel = document.getElementById('resultPanel');
        
        const chk1 = document.getElementById('chk_order').checked;
        const chk2 = document.getElementById('chk_diffuse').checked;
        const chk3 = document.getElementById('chk_moat').checked;
        
        if (!chk1 || !chk2 || !chk3) {
            panel.innerHTML = "<span class='fail' style='font-size:16px;'>🛑 基本面死刑：未通过【战前安检】！拒绝为纯PPT炒作或无护城河标的开火！请核实产业逻辑后打钩。</span>";
            panel.style.borderLeftColor = "var(--accent-red)";
            return;
        }

        const mode = document.getElementById('sniperMode').value;
        const p = parseFloat(document.getElementById('price').value);
        const atr = parseFloat(document.getElementById('atr').value);
        const tp = parseFloat(document.getElementById('targetPrice').value);
        const bias5 = parseFloat(document.getElementById('bias5').value);
        const bias20 = parseFloat(document.getElementById('bias20').value);
        const volToday = parseFloat(document.getElementById('volToday').value);
        const rawVol20 = parseFloat(document.getElementById('vol20Days').value);
        const capital = parseFloat(document.getElementById('capital').value);

        if(isNaN(p) || isNaN(atr) || isNaN(bias5) || isNaN(bias20) || isNaN(tp) || isNaN(volToday) || isNaN(rawVol20) || isNaN(capital)) {
            panel.innerHTML = "<span class='fail'>🛑 火控错误：微观参数不完整（缺少价格/ATR/量能/首发资金等）！</span>"; return;
        }

        let volRatio = 0;
        if (rawVol20 > 0) {
            let ratios = [{ val: volToday/rawVol20 }, { val: (volToday/10000)/rawVol20 }, { val: (volToday/100000000)/rawVol20 }];
            volRatio = ratios.reduce((p, c) => Math.abs(Math.log(c.val)) < Math.abs(Math.log(p.val)) ? c : p).val;
        }

        let log = `🤖 <b>全域火控系统执行审查...</b>\n`;
        let isPass = true; let fails = [];

        const risk = 1.5 * atr;
        const rr = (tp - p) / risk;
        
        if ((tp - p)/p*100 < 8) { fails.push(`赔率死刑：利润空间不足 8%，放弃博弈！`); isPass = false; }
        if (rr < 1.5) { fails.push(`赔率死刑：盈亏比仅 ${rr.toFixed(1)}:1，风险大于收益！`); isPass = false; }

        if (mode === 'B_breakout') {
            if (volRatio < 1.5) { fails.push(`量能死刑：倍量仅 ${volRatio.toFixed(2)}，突破未达爆量标准！`); isPass = false; }
            if (bias5 > 8) { fails.push(`防A杀死刑：BIAS5 = ${bias5}%，严重超买，绝不在高潮点接最后一棒！`); isPass = false; }
        } else if (mode === 'A_pullback') {
            if (volRatio > 0.8) { fails.push(`洗盘死刑：量比 ${volRatio.toFixed(2)}，未达地量，抛压未竭！`); isPass = false; }
            if (bias20 < -1.5 || bias20 > 2.0) { fails.push(`测距死刑：BIAS20=${bias20}%，偏离 MA20 绝对防区！`); isPass = false; }
        } else if (mode === 'A_second') {
            if (volRatio < 1.2) { fails.push(`动能死刑：量比 ${volRatio.toFixed(2)}，二波启动无资金跟随！`); isPass = false; }
            if (bias20 <= 0) { fails.push(`趋势死刑：未有效突破并站稳 MA20。`); isPass = false; }
        }

        if (!isPass) {
            panel.innerHTML = log + "<br><span class='fail' style='font-size:18px;'>🛑 红色警报：拦截开火！</span>\n" + fails.map(f => " ❌ " + f).join("\n");
            panel.style.borderLeftColor = "var(--accent-red)";
        } else {
            const shares = Math.floor(capital / p / 100) * 100;
            const target1R = (p + risk).toFixed(2);
            const target3R = (p + (3 * risk)).toFixed(2);
            
            panel.innerHTML = log + `<br><span class='pass' style='font-size:18px;'>✅ 绿色通道：基本面与火控参数完美，批准射击！</span>\n\n`;
            panel.innerHTML += `🎯 <b>核准首发兵力:</b> <span style="color:var(--warning-yellow);">${shares} 股</span>\n`;
            panel.innerHTML += `⚖️ <b>系统算定量比:</b> <span style="color:var(--api-blue);">${volRatio.toFixed(2)} 倍</span>\n\n`;
            
            // 动态注入魔改版里程碑 HUD
            panel.innerHTML += `
            <div class="milestone-container">
                <div class="milestone-header">🚩 战役推进里程碑 (心理锚点推演)</div>
                
                <div class="milestone-item ms-1r">
                    <div class="ms-title" style="color: var(--api-blue);">【脱离地心引力】</div>
                    <div class="ms-action">当股价触及 <span class="ms-price">${target1R}</span> (1R盈利) 时 👉 动作：将绝对止损线上移至您的建仓成本价，实现本金零风险底仓。</div>
                </div>
                
                <div class="milestone-item ms-bias">
                    <div class="ms-title" style="color: var(--warning-yellow);">【情绪沸点警戒】</div>
                    <div class="ms-action">盯紧盘面，当 BIAS(5) 逼近 10% 或以上时 👉 动作：进入左侧减仓警戒区，随时准备减仓 30% 收割散户。</div>
                </div>
                
                <div class="milestone-item ms-3r">
                    <div class="ms-title" style="color: var(--accent-green);">【主升浪信仰】</div>
                    <div class="ms-action">当股价突破 <span class="ms-price">${target3R}</span> (3R盈利) 且未破 MA20 👉 动作：享受泡沫，不设上限，任由利润狂奔！</div>
                </div>
            </div>`;
            
            panel.style.borderLeftColor = "var(--accent-green)";
        }
    }
</script>
</body>
</html>
