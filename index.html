<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>动量猎手 V32.0 | 量化全自动火控系统 (终极进化版)</title>
    <style>
        :root {
            --bg-color: #0b0e14; --panel-bg: #131820; --text-main: #e0e6ed;
            --text-muted: #6b7280; --accent-green: #00e676; --accent-red: #ff3d00;
            --border-color: #2a3241; --api-blue: #00b0ff; --warning-yellow: #ffd600;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center;}
        .container { width: 100%; max-width: 1000px; }
        
        .hud-panel { background: rgba(19, 24, 32, 0.8); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 0 20px rgba(0, 176, 255, 0.05); }
        .hud-header { font-size: 15px; font-weight: bold; color: var(--api-blue); margin-bottom: 15px; border-bottom: 1px dashed var(--border-color); padding-bottom: 8px; letter-spacing: 1px;}
        
        .grid-2 { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: #8ab4f8; margin-bottom: 4px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 12px; box-sizing: border-box; background-color: #000; border: 1px solid #333; color: var(--text-main); border-radius: 4px; font-size: 15px; font-weight:bold; transition: 0.3s; font-family: 'Courier New', monospace;}
        .form-group input:focus, .form-group select:focus { border-color: var(--api-blue); box-shadow: 0 0 8px rgba(0, 176, 255, 0.3); outline: none; }

        .radar-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; background: #000; padding: 15px; border-radius: 6px; border: 1px solid #333;}
        .btn-scan { padding: 12px 25px; background: var(--api-blue); color: #000; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s; font-size: 15px;}
        .btn-scan:hover { background: #40c4ff; box-shadow: 0 0 15px rgba(0,176,255,0.5); }
        
        .readout-box { background: rgba(0,0,0,0.5); border: 1px solid #333; border-radius: 4px; padding: 15px; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 70px;}
        .readout-box span { font-size: 12px; color: #8ab4f8; margin-bottom: 6px;}
        .readout-box strong { font-size: 28px; color: #fff; font-family: monospace;}

        .checkbox-group { background: rgba(0, 176, 255, 0.05); border: 1px dashed var(--api-blue); padding: 12px; border-radius: 4px; display: flex; align-items: center; gap: 10px; margin-bottom: 12px; transition: 0.3s;}
        .checkbox-group:hover { background: rgba(0, 176, 255, 0.1); }
        .checkbox-group label { font-size: 13px; color: #e0e6ed; cursor: pointer; font-weight: bold; line-height: 1.5; flex: 1;}
        .checkbox-group input { width: 20px; height: 20px; cursor: pointer; flex-shrink: 0;}
        
        .btn-execute { width: 100%; padding: 20px; font-size: 22px; font-weight: bold; background: #8b0000; color: #fff; border: none; border-radius: 6px; cursor: pointer; margin-top: 15px; letter-spacing: 3px; transition: 0.2s;}
        .btn-execute:hover { background: var(--accent-red); box-shadow: 0 0 25px rgba(255, 61, 0, 0.6); }
        
        #resultPanel { background-color: #000; padding: 25px; border-left: 6px solid #333; font-family: monospace; font-size: 15px; white-space: pre-wrap; margin-top: 20px; line-height: 1.7; border-radius: 4px;}
        .pass { color: var(--accent-green); } .fail { color: var(--accent-red); }

        .milestone-container { margin-top: 25px; background: rgba(0,0,0,0.8); border: 1px solid #444; border-radius: 6px; padding: 20px; }
        .milestone-header { color: var(--warning-yellow); font-size: 15px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px dashed #444; padding-bottom: 10px; display: flex; align-items: center;}
        .milestone-item { display: flex; align-items: flex-start; margin-bottom: 15px; padding: 12px; background: rgba(255,255,255,0.03); border-left: 4px solid; border-radius: 0 4px 4px 0;}
        .ms-1r { border-left-color: var(--accent-red); }
        .ms-bias { border-left-color: var(--api-blue); }
        .ms-3r { border-left-color: var(--warning-yellow); }
        .ms-title { font-weight: bold; width: 180px; font-size: 14px; flex-shrink: 0;}
        .ms-action { font-size: 14px; color: #ccc; }
        .ms-price { font-family: monospace; font-size: 16px; font-weight: bold; color: #fff; background: #222; padding: 3px 8px; border-radius: 4px; margin-left: 5px; border: 1px solid #555;}
    </style>
</head>
<body>

<div class="container">
    <div style="text-align:center; margin-bottom: 25px;">
        <h1 style="color:var(--api-blue); margin:0 0 10px 0; letter-spacing: 2px; font-size: 28px;">V32.0 动量火控终端 (全息进化版)</h1>
        <p style="color:#8ab4f8; font-size:14px; margin:0; font-weight: bold;">完美适配 主板10CM & 科创创业20CM | 绝对风控计算器</p>
    </div>

    <div class="radar-bar">
        <input type="text" id="apiCodeInput" placeholder="输入代码 (如 688025)" style="padding:12px; width:220px; background:transparent; border:1px solid #555; color:#fff; font-weight:bold; font-size: 16px;">
        <button class="btn-scan" onclick="fetchStockAPI()">雷达锁定 (实时抓取)</button>
        <input type="text" id="stockName" readonly placeholder="等待锁定..." style="padding:12px; width:150px; background:transparent; border:none; color:var(--warning-yellow); font-weight:bold; font-size:18px;">
        <span id="radarStatus" style="font-size:14px; color:#888; margin-left:auto; font-weight: bold;">[ 雷达待命 ]</span>
    </div>

    <div class="grid-2">
        <div class="hud-panel">
            <div class="hud-header" style="color:var(--warning-yellow); border-bottom-color:var(--warning-yellow);">🛡️ V32.0 四维安检 (强制勾选)</div>
            
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="color:var(--warning-yellow); font-size: 13px;">⚔️ 目标作战阵地 (自动判定)</label>
                <select id="boardType" onchange="updateChecklistText(); liveCalc();">
                    <option value="main">主板 (10CM) - 100股起购</option>
                    <option value="chinext">创业板 (20CM) - 100股起购</option>
                    <option value="star">科创板 (20CM) - 200股起购</option>
                </select>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="chk_macro" checked><label>宏观系统安全 (沪深300指数 近15日未发生破位暴跌)</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="chk_fund" checked><label id="label_fund">基本面通关 (主板：市值≥100亿, 营收增长>10%, ROA>5%, 现金流为正, PE>0)</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="chk_liq" checked><label>流动性深度确认 (近20日 日均换手率 ≥ 3%)</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="chk_vol" checked><label>右侧量价共振确认 (近5日均量 > 近20日均量，非假突破)</label>
            </div>
        </div>

        <div class="hud-panel">
            <div class="hud-header">🎯 战术参数输入面板</div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group" style="grid-column: span 2;">
                    <label style="color:#fff; font-size: 13px;">🏦 账户总资金 (决定1%绝对风控上限)</label>
                    <input type="number" id="capital" placeholder="例：100000" value="100000" oninput="liveCalc()">
                </div>
                <div class="form-group">
                    <label style="color:var(--accent-green);">实时现价 (元)</label>
                    <input type="number" id="price" step="0.01" oninput="liveCalc()">
                </div>
                <div class="form-group">
                    <label style="color:var(--api-blue);">买入后最高价 (元)</label>
                    <input type="number" id="highestPrice" step="0.01" oninput="liveCalc()">
                </div>
                <div class="form-group">
                    <label style="color:var(--warning-yellow);">今日 ATR(14) 真实波幅</label>
                    <input type="number" id="atr" step="0.01" oninput="liveCalc()">
                </div>
                <div class="form-group">
                    <label style="color:var(--accent-red);">MA20 生命线价位</label>
                    <input type="number" id="ma20" step="0.01" oninput="liveCalc()">
                </div>
            </div>
        </div>
    </div>
    
    <div class="hud-panel" style="margin-top: 0;">
        <div class="hud-header">⚖️ 海龟动态推演中心</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
            <div class="readout-box" style="border-color:var(--accent-red); background:rgba(255,0,0,0.1);">
                <span id="stopDistanceLabel">1.5倍 ATR 缓冲空间: --</span>
                <div style="display:flex; justify-content:center; align-items:baseline; gap:10px;">
                    <span style="font-size:14px; color:var(--accent-red);">止损价:</span>
                    <strong id="liveStop" style="color:var(--accent-red);">--</strong>
                </div>
            </div>
            <div class="readout-box" style="border-color:var(--api-blue); background:rgba(0,176,255,0.05);">
                <span>1% 极限本金损耗额度</span>
                <strong id="liveMaxRisk">-- 元</strong>
            </div>
        </div>
        <button class="btn-execute" onclick="executeFireControl()">全息推演 (CALCULATE)</button>
    </div>

    <div id="resultPanel">等待终端参数注入...</div>
</div>

<script>
    function updateChecklistText() {
        const board = document.getElementById('boardType').value;
        const fundLabel = document.getElementById('label_fund');
        if (board === 'main') {
            fundLabel.innerText = "基本面通关 (主板：市值≥100亿, 营收增长>10%, ROA>5%, 现金流为正)";
        } else {
            fundLabel.innerText = "基本面通关 (20CM：市值≥30亿, 营收增长>20%, 研发费用率>8%, 容忍亏损)";
        }
    }

    function fetchStockAPI() {
        let code = document.getElementById('apiCodeInput').value.trim();
        if(!code) return;
        
        if(code.startsWith('688')) { document.getElementById('boardType').value = 'star'; updateChecklistText(); }
        else if(code.startsWith('300')) { document.getElementById('boardType').value = 'chinext'; updateChecklistText(); }
        else if(code.startsWith('60') || code.startsWith('000') || code.startsWith('002')) { document.getElementById('boardType').value = 'main'; updateChecklistText(); }

        if(/^\d{6}$/.test(code)) code = (code.startsWith('6') ? 'sh' : 'sz') + code;
        
        document.getElementById('radarStatus').innerText = "抓取中...";
        const script = document.createElement('script');
        script.src = `https://qt.gtimg.cn/q=${code}`;
        script.onload = function() {
            try {
                const data = window['v_'+code].split('~');
                document.getElementById('stockName').value = data[1]; 
                document.getElementById('price').value = data[3];    
                document.getElementById('highestPrice').value = data[3]; 
                document.getElementById('radarStatus').innerText = "已锁定";
                document.getElementById('radarStatus').style.color = "var(--accent-green)";
                liveCalc(); 
            } catch (e) {
                document.getElementById('radarStatus').innerText = "获取失败";
                document.getElementById('radarStatus').style.color = "var(--accent-red)";
            }
        };
        document.body.appendChild(script);
    }

    function liveCalc() {
        const p = parseFloat(document.getElementById('price').value);
        let high = parseFloat(document.getElementById('highestPrice').value);
        const atr = parseFloat(document.getElementById('atr').value);
        const cap = parseFloat(document.getElementById('capital').value);
        
        const stopDisplay = document.getElementById('liveStop');
        const riskDisplay = document.getElementById('liveMaxRisk');
        const distLabel = document.getElementById('stopDistanceLabel');

        if (isNaN(high) || high < p) high = p;

        if (!isNaN(atr) && atr > 0 && !isNaN(high) && high > 0) {
            const stopDist = 1.5 * atr;
            stopDisplay.innerHTML = (high - stopDist).toFixed(2);
            distLabel.innerHTML = `1.5 倍 ATR 缓冲空间: -${stopDist.toFixed(2)} 元`;
        } else { 
            stopDisplay.innerHTML = "--"; 
            distLabel.innerHTML = "1.5 倍 ATR 缓冲空间: --";
        }

        if (!isNaN(cap) && cap > 0) {
            riskDisplay.innerHTML = (cap * 0.01).toLocaleString('zh-CN') + " 元";
        } else {
            riskDisplay.innerHTML = "-- 元";
        }
    }

    function executeFireControl() {
        const panel = document.getElementById('resultPanel');
        
        const board = document.getElementById('boardType').value;
        const chkMacro = document.getElementById('chk_macro').checked;
        const chkFund = document.getElementById('chk_fund').checked;
        const chkLiq = document.getElementById('chk_liq').checked;
        const chkVol = document.getElementById('chk_vol').checked;
        
        if (!chkMacro || !chkFund || !chkLiq || !chkVol) {
            panel.innerHTML = "<span class='fail' style='font-size:18px;'>🛑 权限驳回：未通过【V32.0 四维全息安检】！</span>\n绝不允许在宏观恶化、基本面拉胯或无量假突破时暴露头寸！";
            panel.style.borderLeftColor = "var(--accent-red)";
            return;
        }

        const p = parseFloat(document.getElementById('price').value);
        let high = parseFloat(document.getElementById('highestPrice').value);
        const atr = parseFloat(document.getElementById('atr').value);
        const ma20 = parseFloat(document.getElementById('ma20').value);
        const capital = parseFloat(document.getElementById('capital').value);

        if(isNaN(p) || isNaN(atr) || isNaN(ma20) || isNaN(capital)) {
            panel.innerHTML = "<span class='fail' style='font-size:16px;'>🛑 战术错误：参数不完整（请核实 总资金/价格/ATR/MA20）！</span>"; return;
        }

        if (isNaN(high) || high < p) high = p;

        let log = `🤖 <b>全域火控系统执行量化审查...</b>\n`;
        let isPass = true; let fails = [];

        // 1. 左侧死刑
        if (p <= ma20) { 
            fails.push(`【左侧死刑】 现价 ${p} 跌破 MA20 生命线 (${ma20})，拒绝接飞刀！`); 
            isPass = false; 
        }

        const maxRisk = capital * 0.01;
        const stopDist = 1.5 * atr;
        const stopPrice = high - stopDist;
        
        // 2. 破位死刑
        if (p < stopPrice) {
            fails.push(`【破位死刑】 现价已触及动态止损位 ${stopPrice.toFixed(2)}，持仓建议立即市价斩仓！`); 
            isPass = false; 
        }

        // 提前拦截技术形态失败
        if (!isPass) {
            panel.innerHTML = log + "<br><span class='fail' style='font-size:20px;'>🛑 红色警报：系统锁死交易接口！</span>\n\n" + fails.map(f => "❌ " + f).join("\n");
            panel.style.borderLeftColor = "var(--accent-red)";
            return;
        }

        // 3. 风控兵力精算
        let raw_shares = maxRisk / stopDist;
        let shares = 0;
        let min_shares = 0;
        let boardRuleText = "";

        if (board === 'star') {
            shares = Math.floor(raw_shares);
            min_shares = 200;
            boardRuleText = "科创板 (200股起购，1股递增)";
        } else if (board === 'chinext') {
            shares = Math.floor(raw_shares / 100) * 100;
            min_shares = 100;
            boardRuleText = "创业板 (100股起购)";
        } else {
            shares = Math.floor(raw_shares / 100) * 100;
            min_shares = 100;
            boardRuleText = "主板 (100股起购)";
        }
        
        // 【核心进化】：资金不足以满足门槛时的“防送死”测算
        if (shares < min_shares) {
            let forced_loss = min_shares * stopDist;
            let excess_ratio = (forced_loss / maxRisk).toFixed(2);
            
            panel.innerHTML = log + `<br><span class='fail' style='font-size:22px;'>🛑 兵力受限：强制拦截指令！</span>\n\n` +
            `基于【1%绝对风控原则】，您的单笔极限亏损为 <strong style="color:#fff;">${maxRisk} 元</strong>。\n` +
            `该股单股止损空间高达 <strong style="color:#fff;">${stopDist.toFixed(2)} 元</strong>，理论安全股数仅为 <strong style="color:var(--warning-yellow);">${raw_shares.toFixed(1)} 股</strong>。\n\n` +
            `❌ <b>系统驳回原因：</b> 安全股数远低于【${boardRuleText}】门槛！\n` +
            `⚠️ <b>防送死测算：</b> 若您此刻强行买入最低限额的 ${min_shares} 股，一旦触及止损，您将单笔亏损 <strong style="color:var(--accent-red); font-size:18px;">${forced_loss.toFixed(2)} 元</strong>！\n` + 
            `这超出了您既定风控额度的 <strong style="color:var(--accent-red); font-size:18px;">${excess_ratio} 倍</strong>。\n\n` +
            `<i>系统判定：标的波动/单价过高，与当前总资金不匹配，坚决放弃狙击！</i>`;
            
            panel.style.borderLeftColor = "var(--accent-red)";
            return;
        }

        // 4. 正常通过，计算成本与仓位上限
        let cost = shares * p;
        let warnMsg = "";

        if (cost > capital * 0.3) {
            let limit_raw_shares = (capital * 0.3) / p;
            if (board === 'star') {
                shares = Math.floor(limit_raw_shares);
            } else {
                shares = Math.floor(limit_raw_shares / 100) * 100;
            }
            cost = shares * p;
            warnMsg = `\n⚠️ <b>风控降维介入：</b> 目标仓位触及单股 30% 上限，已强行削减拨付股数！`;
        }
        
        const ratio = ((cost / capital) * 100).toFixed(2);

        // 5. 渲染成功界面
        panel.innerHTML = log + `<br><span class='pass' style='font-size:20px;'>✅ 绿色通道：风控安检通过，批准火力覆盖！</span>\n`;
        if (warnMsg) panel.innerHTML += `<span style='color:var(--warning-yellow);'>${warnMsg}</span>\n`;
        
        panel.innerHTML += `\n🎯 <b>精确核准兵力 [${boardRuleText}]:</b> <span style="color:var(--accent-green); font-size:22px;">${shares} 股</span>\n`;
        panel.innerHTML += `💰 <b>建仓所需资金:</b> <span style="color:var(--api-blue); font-size:16px;">${cost.toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2})} 元 (占总仓位 ${ratio}%)</span>\n\n`;
        
        panel.innerHTML += `
        <div class="milestone-container">
            <div class="milestone-header">🚩 V32.0 实战交易机器纪律</div>
            
            <div class="milestone-item ms-1r">
                <div class="ms-title" style="color: var(--accent-red);">【一键挂单锁喉】</div>
                <div class="ms-action">买入后立刻设置条件单，止损线为： <span class="ms-price">${stopPrice.toFixed(2)}</span>。跌破机器自动斩仓。${board === 'star' ? '<br><b style="color:var(--warning-yellow);">注意：科创板零股需一次性全部卖出。</b>' : ''}</div>
            </div>
            
            <div class="milestone-item ms-bias">
                <div class="ms-title" style="color: var(--api-blue);">【动态追踪防线】</div>
                <div class="ms-action">明天起，只要创出新高，在此沙盘更新【买入后最高价】，推演上移后的吊灯止损价，让利润奔跑。</div>
            </div>
            
            <div class="milestone-item ms-3r">
                <div class="ms-title" style="color: var(--warning-yellow);">【熔断/排雷红线】</div>
                <div class="ms-action">沪深300指数 15天跌超2%，或财报暴雷跌破基本面底线（主板ROA<5% / 科创研发<8%），无视技术面一键清仓！</div>
            </div>
        </div>`;
        
        panel.style.borderLeftColor = "var(--accent-green)";
    }
</script>
</body>
</html>
