<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>动量猎手 V23.0 | 量化全自动火控系统 (双轨融合版)</title>
    <style>
        :root {
            --bg-color: #0b0e14; --panel-bg: #131820; --text-main: #e0e6ed;
            --text-muted: #6b7280; --accent-green: #00e676; --accent-red: #ff3d00;
            --border-color: #2a3241; --api-blue: #00b0ff; --warning-yellow: #ffd600;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; justify-content: center;}
        .container { width: 100%; max-width: 950px; }
        
        .hud-panel { background: rgba(19, 24, 32, 0.8); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; margin-bottom: 20px; box-shadow: 0 0 20px rgba(0, 176, 255, 0.05); }
        .hud-header { font-size: 14px; font-weight: bold; color: var(--api-blue); margin-bottom: 15px; border-bottom: 1px dashed var(--border-color); padding-bottom: 8px; letter-spacing: 1px;}
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: #8ab4f8; margin-bottom: 4px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 10px; box-sizing: border-box; background-color: #000; border: 1px solid #333; color: var(--text-main); border-radius: 4px; font-size: 14px; font-weight:bold; transition: 0.3s; font-family: 'Courier New', monospace;}
        .form-group input:focus, .form-group select:focus { border-color: var(--api-blue); box-shadow: 0 0 8px rgba(0, 176, 255, 0.3); outline: none; }

        .radar-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; background: #000; padding: 10px; border-radius: 6px; border: 1px solid #333;}
        .btn-scan { padding: 10px 20px; background: var(--api-blue); color: #000; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s;}
        .btn-scan:hover { background: #40c4ff; box-shadow: 0 0 10px rgba(0,176,255,0.5); }
        
        .readout-box { background: rgba(0,0,0,0.5); border: 1px solid #333; border-radius: 4px; padding: 10px; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 60px;}
        .readout-box span { font-size: 11px; color: #6b7280; margin-bottom: 4px;}
        .readout-box strong { font-size: 24px; color: #fff; font-family: monospace;}

        .checkbox-group { background: rgba(0, 176, 255, 0.05); border: 1px dashed var(--api-blue); padding: 10px; border-radius: 4px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; transition: 0.3s;}
        .checkbox-group:hover { background: rgba(0, 176, 255, 0.1); }
        .checkbox-group label { font-size: 13px; color: #8ab4f8; cursor: pointer; font-weight: bold; line-height: 1.4; flex: 1;}
        .checkbox-group input { width: 18px; height: 18px; cursor: pointer; flex-shrink: 0;}
        
        .btn-execute { width: 100%; padding: 20px; font-size: 20px; font-weight: bold; background: #8b0000; color: #fff; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px; letter-spacing: 2px; transition: 0.2s;}
        .btn-execute:hover { background: var(--accent-red); box-shadow: 0 0 20px rgba(255, 61, 0, 0.5); }
        
        #resultPanel { background-color: #000; padding: 20px; border-left: 5px solid #333; font-family: monospace; font-size: 14px; white-space: pre-wrap; margin-top: 20px; line-height: 1.6; }
        .pass { color: var(--accent-green); } .fail { color: var(--accent-red); }

        .milestone-container { margin-top: 20px; background: rgba(0,0,0,0.8); border: 1px solid #444; border-radius: 6px; padding: 15px; }
        .milestone-header { color: var(--warning-yellow); font-size: 14px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px dashed #444; padding-bottom: 8px; display: flex; align-items: center;}
        .milestone-item { display: flex; align-items: flex-start; margin-bottom: 12px; padding: 10px; background: rgba(255,255,255,0.03); border-left: 3px solid; border-radius: 0 4px 4px 0;}
        .ms-1r { border-left-color: var(--accent-red); }
        .ms-bias { border-left-color: var(--api-blue); }
        .ms-3r { border-left-color: var(--accent-green); }
        .ms-title { font-weight: bold; width: 160px; font-size: 13px; flex-shrink: 0;}
        .ms-action { font-size: 13px; color: #ccc; }
        .ms-price { font-family: monospace; font-size: 15px; font-weight: bold; color: #fff; background: #222; padding: 2px 6px; border-radius: 3px; margin-left: 5px;}
    </style>
</head>
<body>

<div class="container">
    <div style="text-align:center; margin-bottom: 20px;">
        <h1 style="color:var(--api-blue); margin:0; letter-spacing: 2px;">V23.0 动量火控终端 (双轨融合版)</h1>
        <p style="color:#666; font-size:12px; margin-top:5px;">完美适配 10CM 主板重装师 & 20CM 科创/创业特种兵</p>
    </div>

    <div class="radar-bar">
        <input type="text" id="apiCodeInput" placeholder="输入股票代码 (如 600519 或 688012)" style="padding:10px; width:220px; background:transparent; border:1px solid #444; color:#fff; font-weight:bold;">
        <button class="btn-scan" onclick="fetchStockAPI()">雷达锁定 (实时抓取)</button>
        <input type="text" id="stockName" readonly placeholder="--" style="padding:10px; width:120px; background:transparent; border:none; color:var(--warning-yellow); font-weight:bold; font-size:16px;">
        <span id="radarStatus" style="font-size:12px; color:#666; margin-left:auto;">等待目标注入...</span>
    </div>

    <div class="grid-2">
        <div class="hud-panel">
            <div class="hud-header" style="color:var(--warning-yellow); border-bottom-color:var(--warning-yellow);">🛡️ V23.0 四维全息安检 (必须全勾选)</div>
            
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="color:var(--warning-yellow); font-size: 14px;">⚔️ 选择作战阵地 (自动切换风控漏斗)</label>
                <select id="boardType" onchange="updateChecklistText(); liveCalc();">
                    <option value="main">【主板 10CM】(100股起步 | 重真金白银)</option>
                    <option value="chinext">【创业板 20CM】(100股起步 | 重研发爆发)</option>
                    <option value="star">【科创板 20CM】(200股起步, 1股递增 | 重研发爆发)</option>
                </select>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="chk_macro" checked><label>宏观系统安全 (沪深300指数 近15日跌幅未超过 2%)</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="chk_fund" checked><label id="label_fund">基本面通关 (主板：市值≥100亿, 营收增长>10%, ROA>5%, 现金流为正, PE>0)</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="chk_liq" checked><label>流动性深度确认 (近20日 日均换手率 ≥ 3%，非织布机)</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="chk_vol" checked><label>右侧量价共振确认 (近5日均量 > 近20日均量，温和放量)</label>
            </div>

            <div class="hud-header" style="margin-top: 25px;">🎯 战术参数录入</div>
            <div class="grid-2">
                <div class="form-group full-width" style="grid-column: span 2;"><label style="color:#fff; font-size: 14px;">🏦 账户总资金 (决定1%绝对风控上限)</label><input type="number" id="capital" placeholder="例：1000000" oninput="liveCalc()"></div>
                <div class="form-group"><label style="color:var(--accent-green);">现价 (API自动抓取)</label><input type="number" id="price" step="0.01" oninput="liveCalc()"></div>
                <div class="form-group"><label style="color:var(--api-blue);">买入后最高价 (建仓填现价)</label><input type="number" id="highestPrice" step="0.01" oninput="liveCalc()"></div>
                <div class="form-group"><label style="color:var(--warning-yellow);">今日 ATR(14) 真实波幅 (必填)</label><input type="number" id="atr" step="0.01" oninput="liveCalc()"></div>
                <div class="form-group"><label style="color:var(--accent-red);">MA20 生命线价位 (必填)</label><input type="number" id="ma20" step="0.01" oninput="liveCalc()"></div>
            </div>
        </div>

        <div class="hud-panel">
            <div class="hud-header">⚖️ 海龟法则计算器读数</div>
            
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="color:var(--accent-red); font-size:14px;">🚨 动态吊灯止损价 (最高价 - 2.5ATR)</label>
                <div class="readout-box" style="border-color:var(--accent-red); background:rgba(255,0,0,0.1); height:70px;">
                    <span id="stopDistanceLabel">止损空间: --</span>
                    <strong id="liveStop" style="color:var(--accent-red); font-size:32px;">--</strong>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label style="color:var(--api-blue); font-size:14px;">🎯 单笔最大允许绝对亏损 (总本金 1%)</label>
                <div class="readout-box" style="border-color:var(--api-blue); background:rgba(0,176,255,0.05); height:70px;">
                    <span>无论盈亏，单笔战役割肉上限</span>
                    <strong id="liveMaxRisk">-- 元</strong>
                </div>
            </div>

            <button class="btn-execute" onclick="executeFireControl()">全息推演 (CALCULATE)</button>
        </div>
    </div>

    <div id="resultPanel">等待全息参数注入...</div>
</div>

<script>
    function updateChecklistText() {
        const board = document.getElementById('boardType').value;
        const fundLabel = document.getElementById('label_fund');
        if (board === 'main') {
            fundLabel.innerText = "基本面通关 (主板：市值≥100亿, 营收增长>10%, ROA>5%, 现金流为正, PE>0)";
        } else {
            fundLabel.innerText = "基本面通关 (20CM：市值≥30亿, 营收增长>20%, 研发费用率>8%, 容忍亏损)";
        }
    }

    function fetchStockAPI() {
        let code = document.getElementById('apiCodeInput').value.trim();
        if(!code) return;
        
        // 自动识别板块并切换 Select
        if(code.startsWith('688')) { document.getElementById('boardType').value = 'star'; updateChecklistText(); }
        else if(code.startsWith('300')) { document.getElementById('boardType').value = 'chinext'; updateChecklistText(); }
        else if(code.startsWith('60') || code.startsWith('000') || code.startsWith('002')) { document.getElementById('boardType').value = 'main'; updateChecklistText(); }

        if(/^\d{6}$/.test(code)) code = (code.startsWith('6') ? 'sh' : 'sz') + code;
        
        document.getElementById('radarStatus').innerText = "抓取中...";
        const script = document.createElement('script');
        script.src = `https://qt.gtimg.cn/q=${code}`;
        script.onload = function() {
            try {
                const data = window['v_'+code].split('~');
                document.getElementById('stockName').value = data[1]; 
                document.getElementById('price').value = data[3];    
                document.getElementById('highestPrice').value = data[3]; 
                document.getElementById('radarStatus').innerText = "已锁定";
                document.getElementById('radarStatus').style.color = "var(--accent-green)";
                liveCalc(); 
            } catch (e) {
                document.getElementById('radarStatus').innerText = "获取失败，请检查代码";
            }
        };
        document.body.appendChild(script);
    }

    function liveCalc() {
        const p = parseFloat(document.getElementById('price').value);
        let high = parseFloat(document.getElementById('highestPrice').value);
        const atr = parseFloat(document.getElementById('atr').value);
        const cap = parseFloat(document.getElementById('capital').value);
        
        const stopDisplay = document.getElementById('liveStop');
        const riskDisplay = document.getElementById('liveMaxRisk');
        const distLabel = document.getElementById('stopDistanceLabel');

        if (isNaN(high) || high < p) high = p;

        if (!isNaN(atr) && atr > 0 && !isNaN(high) && high > 0) {
            const stopDist = 2.5 * atr;
            stopDisplay.innerHTML = (high - stopDist).toFixed(2);
            distLabel.innerHTML = `2.5 倍 ATR 缓冲空间: -${stopDist.toFixed(2)} 元`;
        } else { 
            stopDisplay.innerHTML = "--"; 
            distLabel.innerHTML = "止损空间: --";
        }

        if (!isNaN(cap) && cap > 0) {
            riskDisplay.innerHTML = (cap * 0.01).toLocaleString('zh-CN') + " 元";
        } else {
            riskDisplay.innerHTML = "-- 元";
        }
    }

    function executeFireControl() {
        const panel = document.getElementById('resultPanel');
        
        const board = document.getElementById('boardType').value;
        const chkMacro = document.getElementById('chk_macro').checked;
        const chkFund = document.getElementById('chk_fund').checked;
        const chkLiq = document.getElementById('chk_liq').checked;
        const chkVol = document.getElementById('chk_vol').checked;
        
        if (!chkMacro || !chkFund || !chkLiq || !chkVol) {
            panel.innerHTML = "<span class='fail' style='font-size:16px;'>🛑 权限驳回：未通过【V23.0 四维全息安检】！绝不允许在宏观恶化、基本面拉胯或无量假突破时暴露头寸！</span>";
            panel.style.borderLeftColor = "var(--accent-red)";
            return;
        }

        const p = parseFloat(document.getElementById('price').value);
        let high = parseFloat(document.getElementById('highestPrice').value);
        const atr = parseFloat(document.getElementById('atr').value);
        const ma20 = parseFloat(document.getElementById('ma20').value);
        const capital = parseFloat(document.getElementById('capital').value);

        if(isNaN(p) || isNaN(atr) || isNaN(ma20) || isNaN(capital)) {
            panel.innerHTML = "<span class='fail'>🛑 战术错误：参数不完整（缺少总资金/价格/ATR/MA20等）！</span>"; return;
        }

        if (isNaN(high) || high < p) high = p;

        let log = `🤖 <b>全域火控系统执行量化审查...</b>
`;
        let isPass = true; let fails = [];

        if (p <= ma20) { 
            fails.push(`左侧物理死刑：现价 ${p} 跌破 MA20 生命线 (${ma20})，拒绝接飞刀！`); 
            isPass = false; 
        }

        const maxRisk = capital * 0.01;
        const stopDist = 2.5 * atr;
        const stopPrice = high - stopDist;
        
        if (p < stopPrice) {
            fails.push(`破位死刑：现价已触及动态止损位 ${stopPrice.toFixed(2)}，持仓建议立即斩仓清仓！`); 
            isPass = false; 
        }

        if (!isPass) {
            panel.innerHTML = log + "<br><span class='fail' style='font-size:18px;'>🛑 红色警报：系统锁死交易接口！</span>
" + fails.map(f => " ❌ " + f).join("
");
            panel.style.borderLeftColor = "var(--accent-red)";
        } else {
            // 根据板块动态计算申报股数
            let raw_shares = maxRisk / stopDist;
            let shares = 0;
            let boardRuleText = "";

            if (board === 'star') {
                shares = Math.floor(raw_shares);
                if (shares < 200) shares = 0;
                boardRuleText = "科创板 (200股起购，1股递增)";
            } else if (board === 'chinext') {
                shares = Math.floor(raw_shares / 100) * 100;
                if (shares < 100) shares = 0;
                boardRuleText = "创业板 (100股起购，100股整数倍)";
            } else {
                shares = Math.floor(raw_shares / 100) * 100;
                if (shares < 100) shares = 0;
                boardRuleText = "主板 (100股起购，100股整数倍)";
            }
            
            if (shares === 0) {
                panel.innerHTML = log + `<br><span class='fail' style='font-size:18px;'>🛑 资金不足：按1%风控公式计算，可买股数无法达到【${boardRuleText}】的起步门槛，禁止开仓！</span>
`;
                panel.style.borderLeftColor = "var(--accent-red)";
                return;
            }

            let cost = shares * p;
            let warnMsg = "";

            // 30% 仓位上限防线
            if (cost > capital * 0.3) {
                let limit_raw_shares = (capital * 0.3) / p;
                if (board === 'star') {
                    shares = Math.floor(limit_raw_shares);
                } else {
                    shares = Math.floor(limit_raw_shares / 100) * 100;
                }
                cost = shares * p;
                warnMsg = `
⚠️ <b>风控降维介入：</b> 目标仓位触及单股 30% 上限，已强行削减拨付股数！`;
            }
            
            const ratio = ((cost / capital) * 100).toFixed(2);

            panel.innerHTML = log + `<br><span class='pass' style='font-size:18px;'>✅ 绿色通道：量价关系处于右侧健康区域，批准火力覆盖！</span>
`;
            if (warnMsg) panel.innerHTML += `<span style='color:var(--warning-yellow);'>${warnMsg}</span>
`;
            
            panel.innerHTML += `
🎯 <b>精确核准兵力 [${boardRuleText}]:</b> <span style="color:var(--accent-green); font-size:18px;">${shares} 股</span>
`;
            panel.innerHTML += `💰 <b>建仓所需资金:</b> <span style="color:var(--api-blue);">${cost.toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2})} 元 (占总仓位 ${ratio}%)</span>

`;
            
            panel.innerHTML += `
            <div class="milestone-container">
                <div class="milestone-header">🚩 V23.0 实战交易机器纪律</div>
                
                <div class="milestone-item ms-1r">
                    <div class="ms-title" style="color: var(--accent-red);">【一键挂单锁喉】</div>
                    <div class="ms-action">买入后立刻设置条件单，止损线为： <span class="ms-price">${stopPrice.toFixed(2)}</span>。跌破机器自动斩仓。${board === 'star' ? '注意：科创板零股需一次性全部卖出。' : ''}</div>
                </div>
                
                <div class="milestone-item ms-bias">
                    <div class="ms-title" style="color: var(--api-blue);">【动态追踪防线】</div>
                    <div class="ms-action">明天起，只要创出新高，在此沙盘更新【买入后最高价】，推演上移后的吊灯止损价，让利润奔跑。</div>
                </div>
                
                <div class="milestone-item ms-3r">
                    <div class="ms-title" style="color: var(--warning-yellow);">【熔断/排雷红线】</div>
                    <div class="ms-action">沪深300指数 15天跌超2%，或财报暴雷跌破基本面底线（主板ROA<5% / 科创研发<8%），无视技术面一键清仓！</div>
                </div>
            </div>`;
            
            panel.style.borderLeftColor = "var(--accent-green)";
        }
    }
</script>
</body>
</html>
