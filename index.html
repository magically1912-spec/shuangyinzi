<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>双因子猎手 V12.2 | 量纲自适应版</title>
    <style>
        :root {
            --bg-color: #0b0e14; --panel-bg: #151a22; --text-main: #e0e6ed;
            --text-muted: #6b7280; --accent-green: #00e676; --accent-red: #ff3d00;
            --border-color: #2a3241; --api-blue: #00b0ff; --warning-yellow: #ffd600;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; }
        .header { text-align: center; padding: 10px 0; border-bottom: 2px solid var(--border-color); margin-bottom: 20px; }
        .header h1 { margin: 0; color: var(--accent-green); letter-spacing: 2px; }
        
        .regime-container { background: linear-gradient(90deg, #2b1010 0%, #1a2333 50%, #102b1a 100%); padding: 15px; border-radius: 8px; border: 2px solid var(--warning-yellow); margin-bottom: 20px; box-shadow: 0 0 15px rgba(255, 214, 0, 0.2); }
        .regime-selector { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 12px; }
        .regime-selector label { font-size: 16px; font-weight: bold; color: var(--warning-yellow); }
        .regime-selector select { padding: 10px; font-size: 15px; font-weight: bold; background: #000; color: #fff; border: 1px solid var(--warning-yellow); border-radius: 4px; cursor: pointer; outline: none; }
        .btn-auto { background: var(--warning-yellow); color: #000; font-weight: bold; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; transition: 0.3s;}
        .btn-auto:hover { background: #fff; }
        
        .manual-guide { text-align: center; font-size: 13px; color: #8ab4f8; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 4px; width: fit-content; margin: 0 auto; border: 1px dashed #8ab4f8; }

        .radar-panel { background: #1a2333; border: 1px solid var(--api-blue); border-radius: 8px; padding: 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .radar-panel input { padding: 12px; font-size: 16px; background: #000; color: var(--api-blue); border: 1px solid var(--api-blue); border-radius: 4px; width: 180px; }
        
        .grid-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; transition: opacity 0.3s; }
        .card { background-color: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; }
        .card h2 { font-size: 15px; margin-top: 0; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); color: #8ab4f8; }
        
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 12px; color: #8ab4f8; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 8px; box-sizing: border-box; background-color: #0b0e14; border: 1px solid var(--border-color); color: var(--text-main); border-radius: 4px; }
        
        .bull-only { border-left: 3px solid var(--accent-red); padding-left: 8px; }
        .osc-only { border-left: 3px solid var(--warning-yellow); padding-left: 8px; }

        .btn-execute { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; background-color: #2a3241; color: var(--text-main); border: 2px solid var(--border-color); border-radius: 4px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-execute:hover { background-color: var(--accent-green); color: #000; }
        
        #resultPanel { grid-column: span 3; background-color: #000; padding: 20px; border-left: 4px solid var(--border-color); font-family: monospace; white-space: pre-wrap; margin-top: 20px; line-height: 1.6; min-height: 150px; }
        .pass { color: var(--accent-green); font-weight: bold; } 
        .fail { color: var(--accent-red); font-weight: bold; } 
        .mode-tag { background: #333; padding: 2px 8px; border-radius: 4px; color: var(--warning-yellow); margin-bottom: 10px; display: inline-block; }
    </style>
</head>
<body>

    <div class="header">
        <h1>双因子猎手 V12.2 量纲自适应版</h1>
        <p>量能无脑直填 | 自动测向对数推演 | 状态机自适应</p>
    </div>

    <div class="regime-container">
        <div class="regime-selector">
            <label>⚙️ 宏观大盘环境 :</label>
            <select id="marketRegime" onchange="switchRegime()">
                <option value="bull">🔥 牛市·强趋势 (启用突破战法)</option>
                <option value="osc" selected>🌊 震荡·轮动市 (启用低吸战法)</option>
                <option value="bear">❄️ 熊市·主跌浪 (强制熔断)</option>
            </select>
            <button class="btn-auto" id="autoBtn" onclick="autoDetectRegime()">🤖 自动校准水位</button>
        </div>
        <div class="manual-guide">
            💡 <b>手动校准基准 (上证指数)：</b> 
            <span style="color:var(--accent-red); margin: 0 5px;">🔥 牛市：现价 > MA60 × 1.02</span> | 
            <span style="color:var(--warning-yellow); margin: 0 5px;">🌊 震荡：在 MA60 附近 ±2% 内</span> | 
            <span style="color:var(--accent-green); margin: 0 5px;">❄️ 熊市：现价 < MA60 × 0.98</span>
        </div>
    </div>

    <div class="radar-panel" id="radarPanel">
        <label style="color:var(--api-blue); font-weight:bold;">🎯 代码锁定 :</label>
        <input type="text" id="apiCodeInput" placeholder="如 000001">
        <button style="padding:10px 20px; cursor:pointer;" onclick="fetchStockAPI()">⚡ 极速抓取</button>
        <span id="radarStatus" style="font-size: 12px; color: var(--text-muted); margin-left:auto;">等待指令...</span>
    </div>

    <div class="grid-container" id="mainGrid">
        <div class="card">
            <h2>🛡️ 1. 核心战术输入</h2>
            <div class="form-group osc-only">
                <label>20日均线价格 (元)</label>
                <input type="number" id="ma20Price" step="0.01">
            </div>
            <div class="form-group osc-only">
                <label>过去5日最低价 (元)</label>
                <input type="number" id="lowPast5" step="0.01">
            </div>
            <div class="form-group bull-only" style="display:none;">
                <label>预期止盈 (留空则自动3R)</label>
                <input type="number" id="targetPrice">
            </div>
            <div class="form-group bull-only" style="display:none;">
                <label>🎯 要求量能倍数 (默认 1.5)</label>
                <input type="number" id="volTarget" value="1.5" step="0.1">
            </div>
            <div class="form-group"><label>获利筹码比例 [%] (新高填100)</label><input type="number" id="profitRatio" value="100"></div>
        </div>

        <div class="card">
            <h2>🔭 2. 量价动能测距 (多周期)</h2>
            <div class="form-group"><label>标的名字</label><input type="text" id="stockName" readonly></div>
            <div class="form-group"><label>当前现价</label><input type="number" id="price" step="0.01"></div>
            <div style="display:flex; gap:5px;">
                <div class="form-group"><label>今日量(API抓取)</label><input type="number" id="volToday"></div>
                <div class="form-group"><label style="color:#00e676;">20日均量(无脑直填软件显示)</label><input type="number" id="vol20Days"></div>
            </div>
            <div style="display:flex; gap:5px;">
                <div class="form-group"><label>BIAS(60)</label><input type="number" id="bias"></div>
                <div class="form-group"><label>日线RSI(14)</label><input type="number" id="rsi"></div>
            </div>
            <div class="form-group" style="margin-top: 5px;">
                <label style="color:#ff3d00;">大周期：月线 RSI (要求<=70)</label>
                <input type="number" id="rsiMonthly" value="50">
            </div>
        </div>

        <div class="card">
            <h2>⚖️ 3. 资金与基本面风控</h2>
            <div class="form-group"><label>总资金</label><input type="number" id="capital" value="100000"></div>
            <div class="form-group"><label>市盈率 (TTM) [严禁画饼]</label><input type="number" id="pe"></div>
            <div class="form-group"><label>今日 ATR</label><input type="number" id="atr" step="0.01"></div>
            <div class="form-group"><label>现金流为正？(造血能力)</label>
                <select id="cashFlow"><option value="yes">是</option><option value="no">否</option></select>
            </div>
        </div>

        <div style="grid-column: span 3;">
            <button class="btn-execute" id="execBtn" onclick="executeSystem()">⚡ 数据录入完毕，执行终端审判</button>
        </div>
        
        <div id="resultPanel">等待统帅录入...</div>
    </div>

    <script>
        function autoDetectRegime() {
            const btn = document.getElementById('autoBtn');
            btn.innerText = "📡 数据侦察中...";
            const script = document.createElement('script');
            script.src = 'https://web.ifzq.gtimg.cn/appstock/app/fqkline/get?_var=kline_sh&param=sh000001,day,,,60';
            script.onload = function() {
                try {
                    const days = window.kline_sh.data.sh000001.day;
                    const latestClose = parseFloat(days[days.length-1][2]);
                    let sum = 0; days.forEach(d => sum += parseFloat(d[2]));
                    const ma60 = sum / days.length;
                    
                    const regimeSelect = document.getElementById('marketRegime');
                    if (latestClose > ma60 * 1.02) regimeSelect.value = 'bull';
                    else if (latestClose < ma60 * 0.98) regimeSelect.value = 'bear';
                    else regimeSelect.value = 'osc';
                    
                    alert(`[大盘校准成功]\n最新指数: ${latestClose.toFixed(2)}\nMA60均线: ${ma60.toFixed(2)}\n系统切换至: ${regimeSelect.options[regimeSelect.selectedIndex].text}`);
                    switchRegime();
                } catch(e) { alert("自动校准失败，请参考下方指南进行手动选择环境。"); }
                btn.innerText = "🤖 自动校准水位";
            };
            script.onerror = function() {
                alert("网络连接超时或被浏览器拦截。请看下方手动校准指南！");
                btn.innerText = "🤖 自动校准水位";
            };
            document.body.appendChild(script);
        }

        function switchRegime() {
            const regime = document.getElementById('marketRegime').value;
            const bulls = document.querySelectorAll('.bull-only');
            const oscs = document.querySelectorAll('.osc-only');
            const grid = document.getElementById('mainGrid');
            const panel = document.getElementById('resultPanel');

            if (regime === 'bear') {
                grid.style.opacity = '0.3'; grid.style.pointerEvents = 'none';
                panel.innerHTML = "<span class='fail'>🛑 熊市熔断！大盘跌破生命线，系统强制切断交易权限。空仓保命！</span>";
            } else {
                grid.style.opacity = '1'; grid.style.pointerEvents = 'auto';
                bulls.forEach(el => el.style.display = (regime === 'bull' ? 'block' : 'none'));
                oscs.forEach(el => el.style.display = (regime === 'osc' ? 'block' : 'none'));
                panel.innerHTML = "环境已切换，请录入猎物数据。";
            }
        }

        function fetchStockAPI() {
            let code = document.getElementById('apiCodeInput').value.trim();
            if(!code) return;
            if(/^\d{6}$/.test(code)) code = (code.startsWith('6') ? 'sh' : 'sz') + code;
            
            const script = document.createElement('script');
            script.src = `https://qt.gtimg.cn/q=${code}`;
            script.onload = function() {
                const data = window['v_'+code].split('~');
                document.getElementById('stockName').value = data[1];
                document.getElementById('price').value = data[3];
                document.getElementById('pe').value = data[39] || 0; 
                document.getElementById('volToday').value = data[36];
                document.getElementById('radarStatus').innerText = "✅ 数据锁定";
            };
            document.body.appendChild(script);
        }

        function executeSystem() {
            const regime = document.getElementById('marketRegime').value;
            const panel = document.getElementById('resultPanel');
            const p = parseFloat(document.getElementById('price').value);
            const atr = parseFloat(document.getElementById('atr').value);
            const capital = parseFloat(document.getElementById('capital').value);
            const pe = parseFloat(document.getElementById('pe').value);
            const rsi = parseFloat(document.getElementById('rsi').value);
            const rsiMonthly = parseFloat(document.getElementById('rsiMonthly').value);
            const bias = parseFloat(document.getElementById('bias').value);
            const profit = parseFloat(document.getElementById('profitRatio').value);
            const cashFlow = document.getElementById('cashFlow').value;
            
            const volToday = parseFloat(document.getElementById('volToday').value);
            const rawVol20 = parseFloat(document.getElementById('vol20Days').value);
            
            // ==============================================================
            // 🤖 V12.2 核心科技：对数级自适应单位探测引擎
            // ==============================================================
            let volMultiplier = 0;
            let autoUnit = "未知";
            if (rawVol20 > 0) {
                // 列出三种可能的用户输入单位带来的真实倍数
                let ratios = [
                    { val: volToday / rawVol20, name: "手" },
                    { val: (volToday / 10000) / rawVol20, name: "万手" },
                    { val: (volToday / 100000000) / rawVol20, name: "亿手" }
                ];
                // 使用对数距离寻找最接近 1.0 的倍数，精准判定用户使用的单位数量级
                let bestRatio = ratios.reduce((prev, curr) => 
                    Math.abs(Math.log(curr.val)) < Math.abs(Math.log(prev.val)) ? curr : prev
                );
                volMultiplier = bestRatio.val;
                autoUnit = bestRatio.name;
            }

            const stop = p - (1.5 * atr);
            const risk = p - stop;
            
            let isPass = true;
            let fails = [];
            let log = "";

            if (cashFlow === 'no') { isPass = false; fails.push("基本面死刑：现金流枯竭，缺乏造血能力！"); }
            if (rsiMonthly > 70) { isPass = false; fails.push(`大周期死刑：月线 RSI 高达 ${rsiMonthly}，随时面临爆缸暴跌风险！`); }
            if (profit < 30) { isPass = false; fails.push(`筹码死刑：获利盘仅 ${profit}%，上方全是套牢盘怨魂，抛压极大！`); }

            if (regime === 'bull') {
                log = "<div class='mode-tag'>🔥 正在运行：牛市强势突破序列</div>\n";
                // ⚠️ 打印自适应单位结果
                log += `<span style="color:#00e676">💡 量能自适应校准: 识别到指挥官输入单位为【${autoUnit}】，计算真实倍量为 ${volMultiplier.toFixed(2)} 倍</span>\n`;
                
                const volTarget = parseFloat(document.getElementById('volTarget').value) || 1.5;
                if (pe < 0 || pe > 250) { isPass = false; fails.push(`估值死刑：市盈率(TTM) ${pe} 倍不可超越250倍极限！`); }
                if (volMultiplier < volTarget) { isPass = false; fails.push(`量能死刑：倍量仅 ${volMultiplier.toFixed(2)}，未达进攻红线(${volTarget}倍)！`); }
                if (bias < 0 || bias > 15) { isPass = false; fails.push(`动能死刑：BIAS (${bias}%) 偏离 0~15% 安全发车点！`); }
                if (rsi < 50 || rsi > 75) { isPass = false; fails.push(`情绪死刑：日线 RSI (${rsi}) 动能不在主升区间！`); }
                
                const targetVal = document.getElementById('targetPrice').value.trim();
                let finalTarget = 0;
                if (targetVal === "") {
                    finalTarget = p + (3 * risk);
                    log += `   <span class="api-text">>> 🤖 [蓝天白云引擎] 启动：生成 3R 理论止盈价 [${finalTarget.toFixed(2)} 元]。实战死锁 MA20 防守！</span>\n`;
                } else {
                    finalTarget = parseFloat(targetVal);
                    const rrFinal = (finalTarget - p) / risk;
                    if (rrFinal < 2) { isPass = false; fails.push(`风控死刑：盈亏比仅 ${rrFinal.toFixed(2)} (<2)，拿命搏铜板！`); }
                    log += `🎯 战略止盈目标: ${finalTarget.toFixed(2)}\n`;
                }

            } else {
                log = "<div class='mode-tag'>🌊 正在运行：震荡龙回头低吸序列</div>\n";
                // ⚠️ 打印自适应单位结果
                log += `<span style="color:#00e676">💡 量能自适应校准: 识别到指挥官输入单位为【${autoUnit}】，计算真实倍量为 ${volMultiplier.toFixed(2)} 倍</span>\n`;

                const ma20 = parseFloat(document.getElementById('ma20Price').value);
                const low5 = parseFloat(document.getElementById('lowPast5').value);
                
                if (pe < 0 || pe > 100) { isPass = false; fails.push(`估值死刑：市盈率(TTM) ${pe} 倍超越了 100 倍护城河！`); }
                if (low5 > ma20 * 1.02) { isPass = false; fails.push("形态死刑：过去5日未曾回踩均线洗盘，禁止高位接盘！"); }
                if (bias > 8 || rsi > 65) { isPass = false; fails.push(`追高警报：BIAS(${bias})或日RSI(${rsi})过热，震荡市只准买底部起爆！`); }
                if (volMultiplier < 1.2 || volMultiplier > 3.5) { isPass = false; fails.push(`量能死刑：倍量 ${volMultiplier.toFixed(2)}。要求温和放量(1.2~3.5)，拒绝死水和诱多天量！`); }

                const finalTarget = p + 1.5 * risk;
                log += `🎯 现实止盈目标(1.5R): ${finalTarget.toFixed(2)}\n`;
            }

            if (!isPass) {
                panel.innerHTML = log + "<span class='fail'>🚫 统帅部终极审判：不予放行！</span>\n" + fails.map(f => " ❌ " + f).join("\n");
                panel.style.borderLeftColor = "var(--accent-red)";
            } else {
                const risk_pct = (regime === 'bull' ? 0.015 : 0.01);
                const shares = Math.floor((capital * risk_pct / risk) / 100) * 100;
                panel.innerHTML = log + `<span class='pass'>✅ 审判通过！各指标完美闭环，准许按战略节点开火！</span>\n\n🛡️ 绝对物理止损: ${stop.toFixed(2)}\n📦 建议配仓: ${shares} 股 (动用 ${risk_pct*100}% 风控暴露)\n🚀 核心战令: ${regime==='bull'?'若无阻力，让利润奔跑，跌破MA20清仓！':'触及 1.5R 目标位立刻强制平仓 50% 落袋为安！'}`;
                panel.style.borderLeftColor = "var(--accent-green)";
            }
        }
        
        switchRegime();
    </script>
</body>
</html>
